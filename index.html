<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechner für Druck-/Dichtehöhe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <h1 class="heading">Druck-/Dichtehöhenrechner</h1>
    <h2 class="warning">Nutzung auf eigene Gefahr: Die Nutzung dieser App erfolgt ausschließlich auf eigene Gefahr.</h2>
    <h2 class="warning">Diese App dient lediglich als Informations- und Planungshilfe.</h2>
    <p>Welche Bezugseinheit wollen Sie verwenden (ft/m)?</p>
    <label for="unit">Bitte Auswählen:</label>
    <select id="einheit">
        <option value="" selected></option></optin>
        <option value="ft">Fuß (ft)</option>
        <option value="m">Meter (m)</option>
    </select>
    <p></p>
    <table class="table">
        <tr><td><label>QNH</label></td><td><input type="number" id="qnh" value=""></td><td></td></tr>
        <tr><td><label>Temperatur</label></td><td><input type="number" id="temp" step="1" value=""></td><td></td></tr>
        <tr><td><label>Platzhöhe</label></td><td><input type="number" id="fe" value=""><span id="aktEinh" style="margin-left: 5px;"></span></td></tr>
    </table>
    <br><br>
    <button class="button" onclick="onClickBtn()">Berechnen</button>
    <br><br>
    <div style="display: flex; gap: 20px; justify-content: center;">
  <div class="box">
    <span class="description">Druckhöhe</span>
    <strong class="result" id ="outPressAlt"></strong>
  </div>
  <div class="box">
    <span class="description">Dichtehöhe</span>
    <strong class="result" id="outDensAlt"></strong>
  </div>
</div>
    <script src="app.js"></script>
</body>
<footer>

</footer>
</html>
